<script>firebase.initializeApp({apiKey:"AIzaSyDkV_pw1zfkzBAprnq2UGamFbA1defWPnY",authDomain:"livesportsplay-bc7f8.firebaseapp.com",databaseURL:"https://livesportsplay-bc7f8-default-rtdb.firebaseio.com",projectId:"livesportsplay-bc7f8",storageBucket:"livesportsplay-bc7f8.firebasestorage.app",messagingSenderId:"669238923994",appId:"1:669238923994:web:4f24e92be31f09677c0be3"});const db=firebase.database();const JSON_URL='https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json';let streamUrl='';let matchId='';document.getElementById('randomViewers').innerText=(Math.random()*(50-10)+10).toFixed(1)+'k';const urlParams=new URLSearchParams(window.location.search);const matchSlugParam=urlParams.get('match');function generateMatchSlug(title){return title.split('|')[0].trim().replace(/[^a-zA-Z0-9]/g,'-').toLowerCase();}if(!matchSlugParam){window.location.href='index.html';}else{fetchMatchDataAndPlay();}async function fetchMatchDataAndPlay(){try{const res=await fetch(JSON_URL+'?t='+Date.now());const data=await res.json();const channels=data.channels||[];const matchBaseData=channels.find(m=>generateMatchSlug(m['Match Title'])===matchSlugParam);if(!matchBaseData){document.getElementById('mTitle').innerText="Match not found!";return;}streamUrl=matchBaseData['Stream URL'];matchId=matchSlugParam;const shortTitle=matchBaseData['Match Title'].split('|')[0].trim();document.getElementById('mTitle').innerText=shortTitle;document.getElementById('mSport').innerHTML=`<i class="fa fa-trophy"></i> ${matchBaseData['Category'].toUpperCase()}`;const timeText=matchBaseData['Start Time']||"Live Now";if(timeText.toLowerCase().includes('live')){document.getElementById('mTime').innerText="Streaming Live";}else{document.getElementById('mTime').innerText=timeText;document.querySelector('.m-tag.live .dot').style.display='none';document.querySelector('.m-tag.live').style.background='rgba(252, 163, 17, 0.15)';document.querySelector('.m-tag.live').style.borderColor='rgba(252, 163, 17, 0.3)';document.querySelector('.m-tag.live').style.color='var(--accent-yellow)';}document.getElementById('mSource').innerHTML=`<i class="fa fa-server"></i> Bingstream`;if(streamUrl){const video=document.getElementById('nativeVideo');const loader=document.getElementById('videoLoader');video.style.display='block';loader.style.display='block';let finalPosterUrl=matchBaseData['Match Poster'];if(finalPosterUrl&&!finalPosterUrl.includes('placehold.co')){video.poster=finalPosterUrl;}else if(matchBaseData['Team 1 Logo']){video.poster=matchBaseData['Team 1 Logo'];}if(Hls.isSupported()&&streamUrl.includes('.m3u8')){const hls=new Hls({debug:false,enableWorker:true,lowLatencyMode:true});hls.loadSource(streamUrl);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,function(){loader.style.display='none';video.play().catch(e=>console.log("Autoplay blocked."));});hls.on(Hls.Events.ERROR,function(event,data){if(data.fatal){loader.style.display='none';}});}else if(video.canPlayType('application/vnd.apple.mpegurl')||!streamUrl.includes('.m3u8')){video.src=streamUrl;video.addEventListener('loadedmetadata',function(){loader.style.display='none';video.play().catch(e=>console.log("Autoplay blocked."));});video.addEventListener('error',function(){loader.style.display='none';});}}initFirebaseChat();}catch(e){console.error(e);document.getElementById('mTitle').innerText="Error loading secure stream data.";}}const chatBox=document.getElementById('chatMessages');function handleEnter(e){if(e.key==='Enter')postMessage();}function postMessage(){let name=document.getElementById('chatName').value.trim();const text=document.getElementById('chatText').value.trim();if(!text)return;if(!name)name="Guest";const newMsg={author:name,text:text,time:new Date().getTime()};db.ref('chats/'+matchId).push(newMsg);document.getElementById('chatText').value='';}let isFirstLoad=true;function initFirebaseChat(){db.ref('chats/'+matchId).limitToLast(100).on('value',snapshot=>{const data=snapshot.val();if(!data)return;const isScrolledToBottom=chatBox.scrollHeight-chatBox.clientHeight<=chatBox.scrollTop+50;chatBox.innerHTML='';Object.values(data).forEach(m=>{const timeStr=new Date(m.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const initial=m.author.charAt(0).toUpperCase();const colors=['#ff2a5f','#00f2fe','#00e676','#fca311','#b100ff'];const bgColor=colors[m.author.length%colors.length];const html=` <div class="msg-item"> <div class="msg-avatar" style="background: ${bgColor};">${initial}</div> <div class="msg-content"> <div class="msg-author">${m.author} <span class="msg-time">${timeStr}</span></div> <div class="msg-text">${m.text}</div> </div> </div> `;chatBox.insertAdjacentHTML('beforeend',html);});if(isFirstLoad||isScrolledToBottom){chatBox.scrollTop=chatBox.scrollHeight;isFirstLoad=false;}});}
