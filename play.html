<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay · Premium Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg-main: #05070f;
            --bg-card: #0d111c;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-pink: #ff2a5f;
            --accent-blue: #00f2fe;
            --accent-yellow: #fca311;
            --text-muted: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Layout: Back Left, Logo Right */
        header {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* এটি ব্যাক বাটন বামে এবং লোগো ডানে রাখবে */
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 7, 15, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span:first-child { color: #fff; }
        .logo span:last-child { color: var(--accent-pink); text-shadow: 0 0 12px rgba(255, 42, 95, 0.5); }

        /* Main Content Wrapper */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .video-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 15px auto;
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 42, 95, 0.2);
            border-top-color: var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 5;
        }

        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* Info Section Styling */
        .info-card {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 15px auto;
            padding: 18px;
            background: rgba(13, 17, 28, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
        }

        .m-title {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #fff;
        }

        .m-tags { display: flex; gap: 10px; flex-wrap: wrap; }

        .m-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 7px 14px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #eee;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .m-tag.live {
            background: rgba(255, 42, 95, 0.1);
            border-color: rgba(255, 42, 95, 0.2);
            color: var(--accent-pink);
        }

        .dot { width: 7px; height: 7px; background: var(--accent-pink); border-radius: 50%; animation: blink 1s infinite alternate; }

        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

        /* Ad Section */
        .ad-container {
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
            text-align: center;
        }

        .ad-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: block;
        }

        .ad-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back</a>
    
    <a href="https://livesportsplay.vercel.app" class="logo"><span>LiveSports</span><span>Play</span></a>
</header>

<div class="main-wrapper">
    <div class="video-container">
        <div class="player-wrapper">
            <div class="loader" id="videoLoader"></div>
            <video id="nativeVideo" controls playsinline></video>
        </div>
    </div>

    <div class="info-card">
        <h1 class="m-title" id="mTitle">Loading Premium Stream...</h1>
        <div class="m-tags">
            <span class="m-tag live"><div class="dot"></div> <span id="mTime">Live Now</span></span>
            <span class="m-tag"><i class="fa fa-trophy" style="color:var(--accent-blue)"></i> <span id="mSport">Sport</span></span>
            <span class="m-tag"><i class="fa fa-eye"></i> <span id="randomViewers">12.4k</span> Watching</span>
            <span class="m-tag">Secure Server</span>
        </div>
    </div>

    <div class="ad-container">
        <span class="ad-label">Sponsored Advertisement</span>
        <div class="ad-box">
            <script type="text/javascript">
                atOptions = {
                    'key' : 'd6014953fbfeb02ea1203574721f5745',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/d6014953fbfeb02ea1203574721f5745/invoke.js"></script>
        </div>
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchSlugParam = urlParams.get('match');

    document.getElementById('randomViewers').innerText = (Math.random() * (20 - 5) + 5).toFixed(1) + 'k';

    function generateMatchSlug(title) {
        return title.split('|')[0].trim().replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
    }

    async function fetchMatchDataAndPlay() {
        if (!matchSlugParam) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const res = await fetch(JSON_URL + '?t=' + Date.now());
            const data = await res.json();
            const channels = data.channels || [];
            const matchData = channels.find(m => generateMatchSlug(m['Match Title']) === matchSlugParam);

            if (!matchData) {
                document.getElementById('mTitle').innerText = "Match not found!";
                return;
            }

            document.getElementById('mTitle').innerText = matchData['Match Title'].split('|')[0].trim();
            document.getElementById('mSport').innerText = matchData['Category'];
            
            const streamUrl = matchData['Stream URL'];
            const video = document.getElementById('nativeVideo');
            const loader = document.getElementById('videoLoader');

            if(matchData['Match Poster']) video.poster = matchData['Match Poster'];

            if (Hls.isSupported() && streamUrl.includes('.m3u8')) {
                const hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    loader.style.display = 'none';
                    video.play().catch(() => {});
                });
            } else {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    loader.style.display = 'none';
                    video.play().catch(() => {});
                });
            }
        } catch (e) {
            console.error(e);
        }
    }

    fetchMatchDataAndPlay();
</script>

</body>
</html>
