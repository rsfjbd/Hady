<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay · VIP Stream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --bg-main: #05070f;
            --bg-card: #0d111c;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-pink: #ff2a5f;
            --text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg-main); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }

        header {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 7, 15, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo { font-size: 20px; font-weight: 800; text-decoration: none; }
        .logo span:first-child { color: #fff; }
        .logo span:last-child { color: var(--accent-pink); }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; }

        .player-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- কার্ড কন্টেন্ট সেন্টার করার জন্য আপডেট --- */
        .info-card {
            width: 100%;
            max-width: 900px;
            margin-top: 15px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center; /* হরাইজন্টাল সেন্টার */
            text-align: center;   /* টেক্সট সেন্টার */
        }

        .m-title { 
            font-family: 'Oswald', sans-serif; 
            font-size: 20px; 
            margin-bottom: 15px;
            width: 100%;
        }

        .m-tags { 
            display: flex; 
            flex-direction: row;
            flex-wrap: wrap; 
            gap: 8px; 
            justify-content: center; /* ট্যাগগুলো মাঝখানে রাখবে */
            align-items: center;
            width: 100%;
        }

        .m-tag {
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--glass-border);
            white-space: nowrap;
        }

        .tag-live { color: var(--accent-pink); border-color: rgba(255,42,95,0.3); background: rgba(255,42,95,0.05); }
        .dot { width: 6px; height: 6px; background: var(--accent-pink); border-radius: 50%; animation: blink 1s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

        .ad-section { width: 100%; max-width: 900px; margin-top: 15px; text-align: center; }
        .ad-box { background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border); border-radius: 12px; min-height: 250px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn"><i class="fa fa-arrow-left"></i> Home</a>
    <a href="#" class="logo"><span>Live</span><span>Sports</span></a>
</header>

<div class="main-wrapper">
    <div class="player-container">
        <video id="mainVideo" controls playsinline></video>
    </div>

    <div class="info-card">
        <h1 class="m-title" id="mTitle">Loading Stream...</h1>
        <div class="m-tags">
            <span class="m-tag tag-live"><div class="dot"></div> LIVE</span>
            <span class="m-tag"><i class="fa fa-trophy"></i> <span id="mSport">Sports</span></span>
            <span class="m-tag"><i class="fa fa-users"></i> <span id="viewers">0</span> Watching</span>
        </div>
    </div>

    <div class="ad-section">
        <div class="ad-box">
            <script type="text/javascript">
                atOptions = {'key' : 'd6014953fbfeb02ea1203574721f5745','format' : 'iframe','height' : 250,'width' : 300,'params' : {}};
            </script>
            <script src="https://www.highperformanceformat.com/d6014953fbfeb02ea1203574721f5745/invoke.js"></script>
        </div>
    </div>
</div>

<script>
    const JSON_URL = 'https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json';
    const urlParams = new URLSearchParams(window.location.search);
    const matchSlug = urlParams.get('match');

    document.getElementById('viewers').innerText = (Math.random() * (20 - 5) + 5).toFixed(1) + 'k';

    async function initPlayer() {
        if (!matchSlug) return;
        try {
            const res = await fetch(JSON_URL);
            const data = await res.json();
            const match = data.channels.find(c => 
                c['Match Title'].split('|')[0].trim().replace(/[^a-zA-Z0-9]/g, '-').toLowerCase() === matchSlug
            );

            if (match) {
                document.getElementById('mTitle').innerText = match['Match Title'].split('|')[0].trim();
                document.getElementById('mSport').innerText = match['Category'];
                const video = document.getElementById('mainVideo');
                const streamUrl = match['Stream URL'];
                if (match['Match Poster']) video.poster = match['Match Poster'];

                if (Hls.isSupported() && streamUrl.includes('.m3u8')) {
                    const hls = new Hls();
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                } else {
                    video.src = streamUrl;
                }
            }
        } catch (e) { console.log(e); }
    }
    initPlayer();
</script>

</body>
</html>
