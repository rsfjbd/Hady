<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay Pro v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #05070f;
            --bg-card: #0d111c;
            --accent-pink: #ff2a5f;
            --accent-blue: #00f2fe;
            --text-muted: #8b949e;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-main); color: #fff; overflow-x: hidden; }

        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg-main); position: relative; }

        /* Floating Video Player Section */
        #videoPlayerContainer {
            display: none;
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 1001;
            background: #000;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #videoPlayerContainer iframe { width: 100%; height: 100%; border: none; }
        .player-controls {
            background: #121624;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5,7,15,0.8);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: #fff; }
        .logo span { color: var(--accent-pink); }

        /* New Banner Slider */
        .featured-slider {
            margin: 15px;
            height: 180px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }
        .slide {
            position: absolute; inset: 0;
            background-size: cover;
            background-position: center;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.5s;
        }
        .slide.active { display: flex; animation: fadeIn 0.8s; }
        .slide::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .slide-content { z-index: 1; }

        /* Categoried & Search */
        .scroller { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .pill { 
            padding: 8px 18px; background: var(--glass); border-radius: 20px; 
            font-size: 13px; cursor: pointer; border: 1px solid transparent; white-space: nowrap;
        }
        .pill.active { background: var(--accent-pink); border-color: var(--accent-pink); }

        /* Match Cards */
        .match-list { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: var(--bg-card);
            border-radius: 22px;
            overflow: hidden;
            border: 1px solid var(--glass);
            transition: 0.3s;
        }
        .card-top { 
            height: 100px; padding: 15px; background: linear-gradient(45deg, #161b2c, #0a0e1a);
            display: flex; justify-content: space-between;
        }
        .teams-area {
            display: flex; justify-content: space-around; align-items: center;
            margin-top: -50px; padding: 0 10px;
        }
        .team { text-align: center; flex: 1; }
        .team img { width: 65px; height: 65px; object-fit: contain; background: #1a1f2e; border-radius: 50%; padding: 8px; border: 3px solid #252a3a; }
        .vs { font-family: 'Oswald'; font-size: 24px; opacity: 0.2; margin-top: 20px; }
        
        .card-body { padding: 15px 20px 20px; text-align: center; }
        .league { color: var(--accent-pink); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .m-title { font-size: 15px; font-weight: 600; margin-bottom: 15px; }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px;
        }
        .btn-play { background: linear-gradient(90deg, var(--accent-pink), #ff5e84); color: #fff; }
        .btn-server { background: var(--glass); color: #fff; border: 1px solid var(--glass); }

        /* Floating Nav */
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(18, 22, 36, 0.9);
            backdrop-filter: blur(20px); border-radius: 20px; padding: 12px;
            display: flex; justify-content: space-around; border: 1px solid var(--glass); z-index: 1000;
        }
        .nav-item { color: var(--text-muted); text-align: center; font-size: 20px; cursor: pointer; }
        .nav-item.active { color: var(--accent-pink); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="videoPlayerContainer">
        <div class="player-controls">
            <span id="nowPlayingTitle" style="font-size: 12px; font-weight: 600;">Streaming Match...</span>
            <i class="fa fa-times" onclick="closePlayer()" style="cursor:pointer"></i>
        </div>
        <iframe id="mainIframe" src="" allowfullscreen></iframe>
    </div>

    <header>
        <a href="#" class="logo">LiveSports<span>Play</span></a>
        <div class="user-vip"><i class="fa fa-crown" style="color: gold;"></i></div>
    </header>

    <div class="featured-slider" id="featuredSlider">
        </div>

    <div class="scroller" id="catList">
        <div class="pill active">All Sports</div>
        <div class="pill">Football</div>
        <div class="pill">Cricket</div>
        <div class="pill">UFC/MMA</div>
    </div>

    <div class="match-list" id="matchContainer">
        <p style="text-align: center; opacity: 0.5;">Loading premium streams...</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa fa-home"></i></div>
        <div class="nav-item" onclick="location.reload()"><i class="fa fa-sync-alt"></i></div>
        <div class="nav-item"><i class="fa fa-heart"></i></div>
        <div class="nav-item"><i class="fa fa-search"></i></div>
    </div>
</div>

<script>
    const API_URL = "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json";
    let matches = [];

    async function initApp() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            matches = data.channels.filter(m => m.League !== "Intro");
            
            renderFeatured(matches.slice(0, 3));
            renderMatches(matches);
        } catch (error) {
            document.getElementById('matchContainer').innerHTML = "Failed to load matches.";
        }
    }

    function renderFeatured(featured) {
        const slider = document.getElementById('featuredSlider');
        slider.innerHTML = featured.map((m, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}" style="background-image: url('${m["Match Poster"] || "https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=800"}')">
                <div class="slide-content">
                    <span class="badge" style="background:var(--accent-pink); padding:2px 8px; border-radius:5px; font-size:10px;">TOP MATCH</span>
                    <h2 style="font-family:'Oswald';">${m["Match Title"]}</h2>
                </div>
            </div>
        `).join('');

        // Auto Slider logic
        let currentSlide = 0;
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if(slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    }

    function renderMatches(data) {
        const container = document.getElementById('matchContainer');
        container.innerHTML = data.map(m => {
            const isLive = m["Match Status"].toLowerCase() === "live";
            return `
                <div class="card">
                    <div class="card-top">
                        <span style="font-size:10px; opacity:0.6;"><i class="fa fa-clock"></i> ${m["Start Time"]}</span>
                        ${isLive ? '<span class="live-tag" style="color:#ff2a5f; font-size:10px; font-weight:700;"><i class="fa fa-circle"></i> LIVE</span>' : ''}
                    </div>
                    <div class="teams-area">
                        <div class="team">
                            <img src="${m["Team 1 Logo"]}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5310/5310672.png'">
                            <p style="font-size:12px; font-weight:600; margin-top:5px;">${m["Team 1 Name"] || 'Team A'}</p>
                        </div>
                        <div class="vs">VS</div>
                        <div class="team">
                            <img src="${m["Team 2 Logo"]}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5310/5310672.png'">
                            <p style="font-size:12px; font-weight:600; margin-top:5px;">${m["Team 2 Name"] || 'Team B'}</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="league">${m.League}</div>
                        <div class="m-title">${m["Match Title"]}</div>
                        <div class="btn-group">
                            <button class="btn btn-play" onclick="openPlayer('${m["Match Title"]}', 'server1_url_here')">
                                <i class="fa fa-play"></i> Server 1
                            </button>
                            <button class="btn btn-server" onclick="openPlayer('${m["Match Title"]}', 'server2_url_here')">
                                <i class="fa fa-bolt"></i> Server 2
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openPlayer(title, url) {
        // নোট: আপনার JSON-এ সরাসরি URL না থাকলে স্লাগ থেকে URL তৈরি করার লজিক এখানে হবে
        const player = document.getElementById('videoPlayerContainer');
        const iframe = document.getElementById('mainIframe');
        document.getElementById('nowPlayingTitle').innerText = title;
        
        player.style.display = 'block';
        iframe.src = `play.html?match=${title.replace(/\s+/g, '-').toLowerCase()}`; // অথবা সরাসরি স্ট্রীম লিংক
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closePlayer() {
        document.getElementById('videoPlayerContainer').style.display = 'none';
        document.getElementById('mainIframe').src = '';
    }

    // Initialize
    initApp();
</script>

</body>
</html>
