<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TVBD Sports</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dashjs/dist/dash.all.min.js"></script>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
}
header{
position:sticky;
top:0;
z-index:99;
background:#111827;
padding:14px;
border-bottom:1px solid #334155;
}
.logo{
font-size:24px;
font-weight:900;
color:#fff;
}
.logo span{color:#e11d48}
.notice{
background:#e11d48;
padding:8px;
font-size:12px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
}
.notice div{
display:inline-block;
padding-left:100%;
animation:mar 20s linear infinite;
}
@keyframes mar{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
.wrap{
max-width:900px;
margin:auto;
padding:15px;
}
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}
.tabs button{
flex:1;
padding:10px;
border:none;
background:#1e293b;
color:#fff;
border-radius:10px;
font-weight:700;
cursor:pointer;
}
.tabs button.active{
background:#e11d48;
}
.card{
background:#1e293b;
padding:15px;
border-radius:18px;
margin-bottom:15px;
cursor:pointer;
border:1px solid #334155;
}
.row{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
}
.team{
width:40%;
text-align:center;
}
.team img{
width:60px;
height:60px;
background:#fff;
padding:6px;
border-radius:50%;
object-fit:contain;
}
.vs{
font-weight:900;
font-size:18px;
}
.badge{
background:#e11d48;
padding:5px 10px;
font-size:11px;
border-radius:8px;
font-weight:700;
}
.hidden{
display:none;
}
#playerPage{
position:fixed;
inset:0;
background:#000;
z-index:999;
overflow:auto;
display:none;
}
.topbar{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
}
.serverBtn{
width:100%;
padding:14px;
margin-bottom:10px;
border:none;
border-radius:12px;
background:#e11d48;
color:#fff;
font-weight:700;
cursor:pointer;
}
#artplayer{
width:100%;
aspect-ratio:16/9;
background:#000;
}
</style>
</head>
<body>

<header>
<div class="logo">TVBD <span>SPORTS</span></div>
</header>

<div class="notice">
<div id="noticeText">Loading...</div>
</div>

<div class="wrap">

<div class="tabs">
<button class="active" onclick="filterMatch('all',this)">All</button>
<button onclick="filterMatch('live',this)">Live</button>
<button onclick="filterMatch('upcoming',this)">Upcoming</button>
<button onclick="filterMatch('finished',this)">Finished</button>
</div>

<div id="matchList">
Loading Matches...
</div>

</div>

<!-- Player Page -->
<div id="playerPage">

<div class="topbar">
<button onclick="closePlayer()" style="background:none;border:none;color:#fff;font-size:20px;">
<i class="fas fa-arrow-left"></i>
</button>

<div id="playerTitle">Live Stream</div>
</div>

<div id="artplayer"></div>

<div style="padding:15px">
<div id="serverList"></div>
</div>

</div>

<script>
let allMatches=[];
let currentFilter="all";
let art=null;

/* JSON LOAD */
async function loadPlaylist(){
try{
let res=await fetch("playlist.json?t="+Date.now());
let data=await res.json();

document.getElementById("noticeText").innerText=
data.settings?.notice || "Welcome";

allMatches=Object.values(data.matches || {});
renderMatches();

}catch(e){
document.getElementById("matchList").innerHTML=
"<center style='padding:50px;color:red'>playlist.json not found</center>";
}
}

loadPlaylist();
setInterval(loadPlaylist,30000);

/* FILTER */
function filterMatch(type,btn){
currentFilter=type;
document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
renderMatches();
}

/* RENDER */
function renderMatches(){

let box=document.getElementById("matchList");
box.innerHTML="";

let now=new Date();

let list=allMatches.filter(m=>{

let s=new Date(m.matchTime);
let e=new Date(m.matchEndTime);

if(currentFilter=="live") return now>=s && now<=e;
if(currentFilter=="upcoming") return now<s;
if(currentFilter=="finished") return now>e;

return true;
});

if(list.length==0){
box.innerHTML="<center style='padding:50px'>No Match Found</center>";
return;
}

list.forEach(m=>{

let s=new Date(m.matchTime);
let e=new Date(m.matchEndTime);

let status="Upcoming";

if(now>=s && now<=e) status="Live";
if(now>e) status="Finished";

box.innerHTML+=`
<div class="card" onclick="openMatch('${m.id}')">

<div class="row" style="margin-bottom:15px">
<div>${m.leagueTitle}</div>
<div class="badge">${status}</div>
</div>

<div class="row">

<div class="team">
<img src="${m.team1Logo}">
<div>${m.team1Name}</div>
</div>

<div class="vs">VS</div>

<div class="team">
<img src="${m.team2Logo}">
<div>${m.team2Name}</div>
</div>

</div>

<div style="margin-top:15px;font-size:12px;color:#94a3b8">
${s.toLocaleString()}
</div>

</div>
`;
});

}

/* DETAILS */
function openMatch(id){

let m=allMatches.find(x=>x.id==id);
if(!m) return;

document.getElementById("playerPage").style.display="block";
document.getElementById("playerTitle").innerText=
m.team1Name+" vs "+m.team2Name;

let s=document.getElementById("serverList");
s.innerHTML="";

m.streamLinks.forEach((x,i)=>{

s.innerHTML+=`
<button class="serverBtn"
onclick="playStream('${x.link}')">
${x.name || "Server "+(i+1)}
</button>
`;

});

if(m.streamLinks.length>0){
playStream(m.streamLinks[0].link);
}

}

/* PLAYER */
function playStream(url){

if(art) art.destroy();

art=new Artplayer({
container:"#artplayer",
url:url,
autoplay:true,
fullscreen:true,
theme:"#e11d48",

customType:{
m3u8:function(video,url){
if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}
},

mpd:function(video,url){
dashjs.MediaPlayer().create().initialize(video,url,true);
}
}

});

}

/* CLOSE */
function closePlayer(){
document.getElementById("playerPage").style.display="none";
if(art){
art.destroy();
art=null;
}
}
</script>

</body>
</html>
