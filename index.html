<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSports Pro V3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #050810;
            --card-bg: #0f1422;
            --accent: #ff2a5f;
            --text-gray: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-dark); color: #fff; min-height: 100vh; display: flex; justify-content: center; }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-dark);
            min-height: 100vh;
            padding-bottom: 30px;
        }

        /* Header */
        header {
            position: sticky; top: 0; z-index: 100;
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 8, 16, 0.98);
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 20px; font-weight: 800; color: #fff; text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .status { font-size: 11px; color: #10b981; font-weight: 600; }

        /* Tabs */
        .tab-box { display: flex; margin: 20px; background: #000; padding: 5px; border-radius: 12px; border: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 13px; font-weight: 600; color: var(--text-gray); border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab.active { background: #1e293b; color: #fff; }

        /* Categories */
        .cat-scroller { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 20px; scrollbar-width: none; }
        .cat-scroller::-webkit-scrollbar { display: none; }
        .pill { padding: 7px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 50px; font-size: 12px; white-space: nowrap; cursor: pointer; color: var(--text-gray); }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Match Card */
        .match-list { padding: 0 15px; }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .card-meta { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 11px; font-weight: 700; }
        .live-tag { color: var(--accent); display: flex; align-items: center; gap: 5px; }
        .live-tag span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; }

        .teams-row { display: flex; justify-content: space-around; align-items: center; margin-bottom: 15px; }
        .team { flex: 1; }
        .team img { width: 65px; height: 65px; border-radius: 50%; object-fit: contain; background: #1a1f2e; padding: 8px; border: 1px solid var(--border); margin-bottom: 8px; }
        .team-name { font-size: 12px; font-weight: 600; color: #fff; }
        .vs-text { font-size: 16px; font-weight: 800; opacity: 0.2; font-style: italic; }

        .league-name { color: #00f2fe; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .match-title { font-size: 15px; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }

        .play-btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            text-decoration: none; font-size: 14px; transition: 0.3s;
        }
        .btn-live { background: var(--accent); color: #fff; }
        .btn-upcoming { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="#" class="logo">LIVE<span>SPORTS</span></a>
        <div class="status">● SERVER ONLINE</div>
    </header>

    <div class="tab-box">
        <div class="tab active" onclick="setFilterMode(this, 'live')">Live Now</div>
        <div class="tab" onclick="setFilterMode(this, 'upcoming')">Upcoming</div>
    </div>

    <div class="cat-scroller" id="catBar"></div>

    <div class="match-list" id="matchBox">
        <p style="text-align:center; padding-top:100px; opacity:0.5;">Loading Channels...</p>
    </div>
</div>

<script>
    const JSON_URL = "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json";
    let channelData = [];
    let currentMode = "live";
    let selectedCat = "All";

    async function init() {
        try {
            const response = await fetch(`${JSON_URL}?v=${Date.now()}`);
            const data = await response.json();
            // Intro ফিল্টার করা
            channelData = data.channels.filter(c => c.League !== "Intro");
            renderCats();
            renderUI();
        } catch (e) {
            document.getElementById('matchBox').innerHTML = "Error loading data.";
        }
    }

    function renderCats() {
        const bar = document.getElementById('catBar');
        const uniqueCats = ["All", ...new Set(channelData.map(c => c.Category).filter(Boolean))];
        bar.innerHTML = uniqueCats.map(c => `
            <div class="pill ${c === selectedCat ? 'active' : ''}" onclick="filterCat('${c}')">${c}</div>
        `).join('');
    }

    function filterCat(c) {
        selectedCat = c;
        renderCats();
        renderUI();
    }

    function setFilterMode(el, mode) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        currentMode = mode;
        renderUI();
    }

    function renderUI() {
        const box = document.getElementById('matchBox');
        const filtered = channelData.filter(m => {
            const mMatch = m["Match Status"].toLowerCase() === currentMode;
            const cMatch = selectedCat === "All" || m.Category === selectedCat;
            return mMatch && cMatch;
        });

        if (filtered.length === 0) {
            box.innerHTML = `<p style="text-align:center; padding:50px; opacity:0.3;">No matches available.</p>`;
            return;
        }

        box.innerHTML = filtered.map(m => {
            // লোগো থাকলে দেখাবে, না থাকলে লোগোর সেকশনটাই আসবে না
            const hasLogos = m["Team 1 Logo"] || m["Team 2 Logo"];
            const teamHtml = hasLogos ? `
                <div class="teams-row">
                    <div class="team">
                        ${m["Team 1 Logo"] ? `<img src="${m["Team 1 Logo"]}" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${m["Team 1 Name"] || ''}</div>
                    </div>
                    <div class="vs-text">VS</div>
                    <div class="team">
                        ${m["Team 2 Logo"] ? `<img src="${m["Team 2 Logo"]}" onerror="this.style.display='none'">` : ''}
                        <div class="team-name">${m["Team 2 Name"] || ''}</div>
                    </div>
                </div>` : '';

            return `
                <div class="card">
                    <div class="card-meta">
                        ${currentMode === 'live' ? `<div class="live-tag"><span></span> LIVE</div>` : `<div>${m["Start Time"]}</div>`}
                        <div style="opacity:0.4;">FULL HD</div>
                    </div>
                    
                    ${teamHtml}

                    <div class="league-name">${m.League || ''}</div>
                    <div class="match-title">${m["Match Title"]}</div>
                    
                    ${currentMode === 'live' 
                        ? `<a href="play.html?match=${encodeURIComponent(m["Match Title"])}" class="play-btn btn-live"><i class="fa fa-play-circle"></i> WATCH NOW</a>`
                        : `<button class="play-btn btn-upcoming"><i class="fa fa-bell"></i> NOTIFY ME</button>`
                    }
                </div>
            `;
        }).join('');
    }

    init();
</script>

</body>
</html>
