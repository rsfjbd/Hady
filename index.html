<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #05070f;
            --bg-card: #0d111c;
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-pink: #ff2a5f;
            --accent-blue: #00f2fe;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 42, 95, 0.05), transparent 40%);
        }

        .app-container { width: 100%; max-width: 480px; position: relative; padding-bottom: 40px; }

        header {
            position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; background: rgba(5, 7, 15, 0.85);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 24px; font-weight: 800; text-decoration: none; color: #fff; }
        .logo span { color: var(--accent-pink); }

        .controls-container { padding: 20px; }
        
        .search-box-wrapper { position: relative; margin-bottom: 20px; }
        .search-box-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { 
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            padding: 12px 15px 12px 45px; border-radius: 12px; color: #fff; outline: none;
        }

        .tabs { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 5px; border: 1px solid var(--glass-border); }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 14px; cursor: pointer; color: var(--text-muted); border-radius: 8px; }
        .tab.active { background: rgba(255,255,255,0.1); color: #fff; }

        .list-container { padding: 0 20px; }
        .match-card { 
            background: var(--bg-card); border-radius: 20px; border: 1px solid var(--glass-border); 
            margin-bottom: 20px; overflow: hidden; transition: 0.3s;
        }

        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 12px; text-transform: uppercase; }
        .badge-live { background: rgba(255, 42, 95, 0.15); color: var(--accent-pink); border: 1px solid var(--accent-pink); }

        .team-section { display: flex; align-items: center; justify-content: space-around; padding: 20px; }
        .team-box { text-align: center; flex: 1; }
        .team-logo { width: 60px; height: 60px; object-fit: contain; margin-bottom: 8px; }
        .team-name { font-size: 12px; font-weight: 600; }
        .vs { font-family: 'Oswald', sans-serif; font-size: 24px; opacity: 0.2; }

        .card-info { padding: 15px; border-top: 1px solid var(--glass-border); }
        .match-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        
        .play-btn { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            background: linear-gradient(90deg, var(--accent-pink), #e60039);
            color: #fff; font-weight: 700; cursor: pointer; text-decoration: none;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        footer { text-align: center; padding: 30px; font-size: 11px; color: var(--text-muted); border-top: 1px solid var(--glass-border); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="#" class="logo">LiveSports<span>Play</span></a>
    </header>

    <div class="controls-container">
        <div class="search-box-wrapper">
            <i class="fa fa-search"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search matches...">
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('live')">Live</div>
            <div class="tab" onclick="switchTab('upcoming')">Upcoming</div>
        </div>
    </div>

    <div class="list-container" id="matchContainer">
        </div>

    <footer>
        <div>© 2026 LiveSportsPlay</div>
        <div style="margin-top:5px; color: var(--accent-blue);">Developed by RS LIVE</div>
    </footer>
</div>

<script>
    const JSON_URL = "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json";
    let allMatches = [];
    let currentStatus = 'live';

    async function loadMatches() {
        try {
            const res = await fetch(JSON_URL + "?t=" + Date.now());
            const data = await res.json();
            allMatches = data.channels.filter(m => m.League !== "Intro");
            renderMatches();
        } catch (e) {
            console.error("Failed to load data");
        }
    }

    function switchTab(status) {
        currentStatus = status;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderMatches();
    }

    function renderMatches() {
        const container = document.getElementById('matchContainer');
        container.innerHTML = "";
        
        const filtered = allMatches.filter(m => m["Match Status"].toLowerCase() === currentStatus);

        filtered.forEach(match => {
            const slug = match["Match Title"].split('|')[0].trim().replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
            const card = `
                <div class="match-card">
                    <div class="card-header">
                        <span class="badge ${match["Match Status"].toLowerCase() === 'live' ? 'badge-live' : ''}">${match["Match Status"]}</span>
                        <span style="font-size:11px; color:var(--text-muted)">${match["Category"]}</span>
                    </div>
                    <div class="team-section">
                        <div class="team-box">
                            <img src="${match["Team 1 Logo"]}" class="team-logo">
                            <div class="team-name">${match["Team 1 Name"]}</div>
                        </div>
                        <div class="vs">VS</div>
                        <div class="team-box">
                            <img src="${match["Team 2 Logo"]}" class="team-logo">
                            <div class="team-name">${match["Team 2 Name"]}</div>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="match-title">${match["Match Title"].split('|')[0]}</div>
                        <a href="play.html?match=${slug}" class="play-btn">
                            <i class="fa fa-play"></i> ${currentStatus === 'live' ? 'Watch Live' : 'Details'}
                        </a>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    loadMatches();
</script>
</body>
</html>
