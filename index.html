<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay V3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #02040a;
            --bg-card: #0d111c;
            --accent-pink: #ff2a5f;
            --accent-blue: #00f2fe;
            --accent-yellow: #fca311;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-live: linear-gradient(135deg, #ff2a5f, #e60039);
            --gradient-blue: linear-gradient(135deg, #00f2fe, #0088cc);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 42, 95, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: rgba(5, 7, 15, 0.7);
            backdrop-filter: blur(10px);
            position: relative;
            padding-bottom: 50px;
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
        }

        /* --- Header & Navigation --- */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: rgba(5, 7, 15, 0.9);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 22px; font-weight: 800; text-decoration: none; color: #fff; letter-spacing: -0.5px; }
        .logo span { color: var(--accent-pink); }

        .controls-container { padding: 20px; }

        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }

        .pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .pill.active {
            background: var(--gradient-live);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 42, 95, 0.3);
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 15px 14px 45px;
            border-radius: 14px;
            color: #fff;
            outline: none;
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent-pink); background: rgba(255,255,255,0.08); }

        .tabs {
            display: flex;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab.active { background: rgba(255,255,255,0.08); color: #fff; }

        /* --- Match Cards --- */
        .list-container { padding: 0 20px; }
        .section-title { font-size: 18px; font-weight: 700; margin: 10px 0 20px; display: flex; align-items: center; gap: 8px; }

        .match-card {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        .card-top {
            height: 100px;
            background: linear-gradient(to bottom, #1a1f2b, #0d111c);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .badge-live {
            background: rgba(255, 42, 95, 0.15);
            color: var(--accent-pink);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid rgba(255, 42, 95, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .pulse-dot { width: 6px; height: 6px; background: var(--accent-pink); border-radius: 50%; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .team-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            margin-top: -50px;
            position: relative;
        }
        .team-box { text-align: center; flex: 1; }
        .team-logo {
            width: 75px; height: 75px;
            background: #1a1d24;
            border-radius: 50%;
            padding: 10px;
            border: 3px solid #2a2d36;
            margin-bottom: 8px;
            object-fit: contain;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .team-name { font-size: 13px; font-weight: 600; color: #fff; }
        .vs-badge { font-family: 'Oswald', sans-serif; font-style: italic; opacity: 0.2; font-size: 28px; }

        .card-body { padding: 20px; }
        .league-name { color: var(--accent-blue); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .match-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; line-height: 1.4; }

        .match-meta { display: flex; gap: 10px; margin-bottom: 20px; }
        .meta-item { background: var(--glass); padding: 5px 12px; border-radius: 8px; font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

        .btn-play {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
        }
        .btn-live { background: var(--gradient-live); box-shadow: 0 10px 20px rgba(255, 42, 95, 0.2); }
        .btn-upcoming { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }

        /* --- Footer --- */
        footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--glass-border); margin-top: 20px; }
        .dev-tag { font-size: 12px; color: var(--text-muted); }
        .dev-name { color: var(--accent-blue); font-weight: 700; text-decoration: none; }

        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--gradient-blue); color: #000; padding: 12px 25px;
            border-radius: 50px; font-weight: 600; transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000; box-shadow: 0 10px 30px rgba(0, 242, 254, 0.3);
        }
        #toast.active { bottom: 30px; }
    </style>
</head>
<body>

<div id="toast">Reminder Set Successfully!</div>

<div class="app-container">
    <header>
        <a href="#" class="logo">LIVE<span>SPORTS</span></a>
        <div class="meta-item" style="border-radius: 20px;"><i class="fa fa-circle" style="color:var(--accent-pink); font-size: 8px;"></i> Online</div>
    </header>

    <div class="controls-container">
        <div class="categories" id="catList"></div>
        
        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInp" class="search-input" placeholder="Find your match...">
        </div>

        <div class="tabs">
            <div class="tab active" data-type="live">Live Now</div>
            <div class="tab" data-type="upcoming">Schedule</div>
        </div>
    </div>

    <div class="list-container">
        <h2 class="section-title" id="secLabel">Premium Live</h2>
        <div id="matchList"></div>
    </div>

    <footer>
        <p class="dev-tag">Powered by <a href="#" class="dev-name">RS LIVE</a> &copy; 2026</p>
    </footer>
</div>

<script>
    const API_URL = "https://raw.githubusercontent.com/srhady/bingstream/refs/heads/main/playlist.json";
    let dataStore = [];
    let filterStatus = "live";
    let filterCat = "All";

    // Fetch Data
    async function initApp() {
        try {
            const res = await fetch(`${API_URL}?v=${Date.now()}`);
            const json = await res.json();
            dataStore = json.channels.filter(item => item.League !== "Intro");
            
            setupCategories();
            render();
        } catch (err) {
            console.error("Load Error", err);
        }
    }

    function setupCategories() {
        const cats = ["All", ...new Set(dataStore.map(i => i.Category))];
        const container = document.getElementById('catList');
        container.innerHTML = cats.map(c => `<div class="pill ${c === filterCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</div>`).join('');
    }

    window.setCat = (c) => {
        filterCat = c;
        setupCategories();
        render();
    };

    // Tabs logic
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            filterStatus = e.target.dataset.type;
            document.getElementById('secLabel').innerText = filterStatus === 'live' ? 'Premium Live' : 'Match Schedule';
            render();
        });
    });

    // Search logic
    document.getElementById('searchInp').addEventListener('input', (e) => {
        render(e.target.value.toLowerCase());
    });

    function render(query = "") {
        const container = document.getElementById('matchList');
        const filtered = dataStore.filter(m => {
            const statusMatch = m["Match Status"].toLowerCase() === filterStatus;
            const catMatch = filterCat === "All" || m.Category === filterCat;
            const searchMatch = m["Match Title"].toLowerCase().includes(query);
            return statusMatch && catMatch && searchMatch;
        });

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.5;">No matches found</div>`;
            return;
        }

        container.innerHTML = filtered.map(m => `
            <div class="match-card">
                <div class="card-top">
                    ${filterStatus === 'live' 
                        ? `<div class="badge-live"><div class="pulse-dot"></div> LIVE</div>` 
                        : `<div class="meta-item"><i class="fa fa-clock"></i> ${m["Start Time"]}</div>`}
                    <div class="meta-item"><i class="fa fa-users"></i> ${(Math.random() * 50 + 10).toFixed(1)}k</div>
                </div>
                
                <div class="team-display">
                    <div class="team-box">
                        <img src="${m["Team 1 Logo"]}" class="team-logo" onerror="this.src='https://placehold.co/100x100/1a1d24/white?text=T1'">
                        <div class="team-name">${m["Team 1 Name"] || 'Team 1'}</div>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="team-box">
                        <img src="${m["Team 2 Logo"]}" class="team-logo" onerror="this.src='https://placehold.co/100x100/1a1d24/white?text=T2'">
                        <div class="team-name">${m["Team 2 Name"] || 'Team 2'}</div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="league-name">${m.League}</div>
                    <div class="match-title">${m["Match Title"]}</div>
                    <div class="match-meta">
                        <div class="meta-item"><i class="fa fa-trophy"></i> ${m.Category}</div>
                        <div class="meta-item"><i class="fa fa-bolt"></i> HD</div>
                    </div>
                    ${filterStatus === 'live' 
                        ? `<a href="play.html?match=${encodeURIComponent(m["Match Title"])}" class="btn-play btn-live"><i class="fa fa-play"></i> Watch Now</a>`
                        : `<button class="btn-play btn-upcoming" onclick="showToast()"><i class="fa fa-bell"></i> Notify Me</button>`
                    }
                </div>
            </div>
        `).join('');
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('active');
        setTimeout(() => t.classList.remove('active'), 3000);
    }

    initApp();
</script>

</body>
</html>
