<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>LiveSportsPlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-card: #131a26;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-pink: #ff2a5f;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 20px; }
        
        header { padding: 15px; text-align: center; border-bottom: 1px solid var(--glass-border); margin-bottom: 10px; }
        .logo { font-size: 24px; font-weight: 800; text-decoration: none; font-family: 'Oswald'; }
        .logo span:first-child { color: #fff; }
        .logo span:last-child { color: var(--accent-pink); }

        .search-container { padding: 0 15px 15px; }
        .search-input { width: 100%; background: #1a2230; border: 1px solid var(--glass-border); padding: 12px 15px; border-radius: 8px; color: #fff; outline: none; font-size: 14px; }

        .tab-box { display: flex; gap: 10px; padding: 0 15px 15px; }
        .tab-btn { flex: 1; padding: 12px; background: #1a2230; border-radius: 10px; text-align: center; font-size: 15px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: 0.3s; border: 1px solid transparent; }
        .tab-btn.active { background: #2d3748; color: #fff; border-color: var(--glass-border); }

        .list-container { padding: 0 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* কার্ড ডিজাইন হুবহু আপনার স্ক্রিনশটের মতো */
        .match-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px; position: relative; }
        
        .card-top-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 11px; font-family: 'Oswald'; }
        .league-tag { color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .league-tag i { color: #4fd1c5; font-size: 14px; }
        
        .match-time { color: #fff; text-align: right; }
        .match-time .date-blue { color: #63b3ed; margin-left: 5px; }

        .teams-row { display: flex; align-items: center; justify-content: space-between; gap: 5px; padding: 10px 0; }
        .team-part { flex: 1; display: flex; align-items: center; gap: 12px; min-width: 0; }
        .team-part.right { justify-content: flex-end; text-align: right; flex-direction: row-reverse; }
        
        .t-logo { width: 50px; height: 50px; object-fit: contain; flex-shrink: 0; border-radius: 50%; background: #1a2230; padding: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .t-name { font-size: 14px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .vs-divider { font-family: 'Oswald'; font-size: 18px; color: #4a5568; font-weight: 600; padding: 0 15px; font-style: italic; }

        .live-badge { position: absolute; left: 18px; top: -10px; background: var(--accent-pink); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 6px; box-shadow: 0 4px 12px rgba(255, 42, 95, 0.4); }
        
        .footer-text { text-align: center; margin-top: 40px; font-family: 'Oswald'; font-size: 13px; color: #4fd1c5; letter-spacing: 2px; padding: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-container">
    <header><a href="#" class="logo"><span>LiveSports</span><span>Play</span></a></header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search matches...">
    </div>

    <div class="tab-box">
        <div class="tab-btn active" id="liveTab" onclick="switchTab('live')">Live</div>
        <div class="tab-btn" id="upcomingTab" onclick="switchTab('upcoming')">Upcoming</div>
    </div>

    <div class="list-container" id="matchContainer"></div>
    <div class="footer-text">DEVELOPED BY RUBEL AHMED</div>
</div>

<script>
    const JSON_URL = "https://raw.githubusercontent.com/IPTVFlixBD/Fancode-BD/refs/heads/main/data.json";
    let allMatches = [], currentStatus = 'live';

    async function loadData() {
        try {
            const response = await fetch(JSON_URL + "?t=" + Date.now());
            const data = await response.json();
            allMatches = (data.channels || []).filter(m => m.League !== "Intro");
            render();
        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    function switchTab(status) {
        currentStatus = status;
        document.getElementById('liveTab').classList.toggle('active', status === 'live');
        document.getElementById('upcomingTab').classList.toggle('active', status === 'upcoming');
        render();
    }

    function render() {
        const container = document.getElementById('matchContainer');
        const query = document.getElementById('searchInput').value.toLowerCase();
        container.innerHTML = "";

        const filtered = allMatches.filter(m => {
            const mStatus = (m["Match Status"] || "").toLowerCase();
            const mTitle = (m["Match Title"] || "").toLowerCase();
            return mStatus === currentStatus && mTitle.includes(query);
        });

        filtered.forEach(m => {
            const isLive = currentStatus === 'live';
            const matchTitle = m["Match Title"] || "Sports Match";
            const slug = matchTitle.split('|')[0].trim().replace(/[^a-zA-Z0-9]/g, "-").toLowerCase();
            
            const timePart = m["Start Time"] || "00:00 AM 01-01-2026";
            const parts = timePart.split(' ');
            const timeOnly = parts[0] + " " + (parts[1] || "");
            const dateOnly = parts[2] || "";

            // লোগো এবং নাম না থাকলে সুন্দর ডিফল্ট ভ্যালু (স্ক্রিনশটের মতো)
            const team1Name = m["Team 1 Name"] || (isLive ? "Live Channel" : "TBA");
            const team2Name = m["Team 2 Name"] || (isLive ? "Streaming" : "TBA");
            
            const logo1 = m["Team 1 Logo"] || `https://ui-avatars.com/api/?name=${team1Name}&background=1a2230&color=fff`;
            const logo2 = m["Team 2 Logo"] || `https://ui-avatars.com/api/?name=${team2Name}&background=1a2230&color=fff`;

            container.innerHTML += `
                <a href="${isLive ? 'play.html?match='+slug : '#'}" style="text-decoration:none; color:inherit;">
                    <div class="match-card">
                        ${isLive ? '<div class="live-badge">LIVE NOW</div>' : ''}
                        
                        <div class="card-top-info">
                            <div class="league-tag">
                                <i class="fa-solid fa-trophy"></i> ${m.League || 'Tournament'}
                            </div>
                            <div class="match-time">
                                ${m.Category || 'Sports'} 
                                ${isLive ? '<span style="color:#ff2a5f; margin-left:5px;">● Live</span>' : `${timeOnly} <span class="date-blue">${dateOnly}</span>`}
                            </div>
                        </div>

                        <div class="teams-row">
                            <div class="team-part">
                                <img src="${logo1}" class="t-logo" onerror="this.src='https://placehold.co/100/1a2230/fff?text=T1'">
                                <span class="t-name">${team1Name}</span>
                            </div>
                            
                            <div class="vs-divider">VS</div>
                            
                            <div class="team-part right">
                                <img src="${logo2}" class="t-logo" onerror="this.src='https://placehold.co/100/1a2230/fff?text=T2'">
                                <span class="t-name">${team2Name}</span>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        });
    }

    document.getElementById('searchInput').oninput = render;
    loadData();
</script>
</body>
</html>
